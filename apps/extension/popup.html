<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanchay</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 320px;
        background: #fafafa;
        color: #111;
      }
      .header {
        padding: 12px 16px;
        border-bottom: 1px solid #e5e5e5;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .header h1 { font-size: 14px; font-weight: 600; }
      .body { padding: 16px; }
      .section { margin-bottom: 14px; }
      label { display: block; font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
      input, select, textarea {
        width: 100%; font-size: 13px; border: 1px solid #d4d4d4; border-radius: 8px;
        padding: 8px 12px; background: #fff; outline: none; font-family: inherit;
      }
      input:focus, select:focus, textarea:focus { border-color: #2563eb; }
      textarea { resize: none; rows: 3; }
      .preview {
        font-size: 12px; color: #666; display: flex; align-items: center; gap: 6px;
        padding: 8px 12px; background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px;
      }
      .preview img { width: 14px; height: 14px; border-radius: 2px; }
      .preview .title { font-weight: 500; color: #1e40af; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      button.save {
        width: 100%; padding: 10px; background: #2563eb; color: #fff; border: none;
        border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
      }
      button.save:hover { background: #1d4ed8; }
      button.save:disabled { opacity: 0.5; cursor: not-allowed; }
      .status { font-size: 12px; text-align: center; margin-top: 8px; min-height: 18px; }
      .status.error { color: #ef4444; }
      .status.success { color: #16a34a; }
      /* Setup screen */
      #setup { padding: 16px; }
      #setup p { font-size: 13px; color: #555; margin-bottom: 12px; line-height: 1.5; }
      #setup input { margin-bottom: 10px; }
      #setup button { width: 100%; padding: 10px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Sanchay</h1>
    </div>

    <!-- Setup screen (shown when no API key stored) -->
    <div id="setup" class="hidden">
      <p>Paste your Sanchay API key to connect the extension. Generate one in <strong>Settings → API Keys</strong>.</p>
      <label for="api-key-input">API Key</label>
      <input type="password" id="api-key-input" placeholder="sk_…" />
      <button id="save-key-btn">Connect</button>
      <div class="status" id="setup-status"></div>
    </div>

    <!-- Main popup (shown when API key exists) -->
    <div id="main" class="hidden body">
      <div class="section" id="preview-section"></div>

      <div class="section">
        <label for="collection-select">Collection</label>
        <select id="collection-select">
          <option value="">Unsorted</option>
        </select>
      </div>

      <div class="section">
        <label for="note-input">Note (optional)</label>
        <textarea id="note-input" placeholder="Optional note…" rows="2"></textarea>
      </div>

      <button class="save" id="save-btn">Save to Sanchay</button>
      <div class="status" id="main-status"></div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
